# config.yaml — единый конфиг всего бота
#
# ВАЖНО: config.yaml задаёт только СТАРТОВЫЕ значения.
# После первого запуска создаётся bot_settings_{name}.json —
# он редактируется из GUI (app.py) и применяется В РЕАЛЬНОМ ВРЕМЕНИ.
#
# АККАУНТЫ И СЕРВЕРЫ:
#   Аккаунты можно задавать ЗДЕСЬ (accounts:) или добавлять через GUI —
#   те сохраняются в accounts_gui.json и мержатся с этим списком.
#   Каждый аккаунт = свой сервер + свой логин/пароль + свои куки.
#   Запуск: все сразу `python runner.py`, или по одному из GUI (Старт/Стоп),
#   или `python runner.py --account acc2` — процессы полностью независимы.
#
# ЛОГИН/ПАРОЛЬ (приоритет):
#   1. поля email/password у аккаунта (тут или в GUI)
#   2. .env: TRAVIAN_EMAIL_ACC1 / TRAVIAN_PASSWORD_ACC1 (имя заглавными)
#   3. .env: TRAVIAN_EMAIL / TRAVIAN_PASSWORD (общие, если аккаунт один)
#
# ⚠️ БЕЗОПАСНОСТЬ: telegram_token засветился в переписке/файлах —
# отзови его через @BotFather (/revoke) и лучше вынеси в .env:
#   TELEGRAM_TOKEN=...
#   TELEGRAM_CHAT_ID=...

