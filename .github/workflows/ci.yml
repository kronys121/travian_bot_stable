name: CI

# Запускается на каждый пуш и на pull request'ы.
on:
  push:
  pull_request:

jobs:
  tests:
    name: Тесты и проверка кодировки
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile all sources (syntax check)
        run: python -m compileall -q app.py runner.py main.py services actions utils config

      - name: Run unit tests + encoding guard
        run: python -m unittest discover -s tests -p "test_*.py" -v
