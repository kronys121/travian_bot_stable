<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Аналитика — __ACCOUNT__</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1115; --card: #171a21; --card2: #1c2028; --border: #2a2f3a;
    --text: #c9cfda; --muted: #7f8899; --accent: #e94560;
    --wood: #6a9a5b; --clay: #c1662f; --iron: #8a8f98; --crop: #d9b23a;
    --troops: #5b8fd9; --hero: #b47ad0;
  }
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
  a { color: var(--accent); text-decoration: none; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  h2 { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin: 0 0 10px; }
  .top { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; margin-bottom: 16px; }
  .top .sub { color: var(--muted); font-size: 12px; }
  .btn { display: inline-block; padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); background: var(--card2); font-size: 12px; cursor: pointer; }
  .btn:hover { border-color: var(--accent); }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 18px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
  .card .k { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
  .card .v { font-size: 22px; font-weight: 700; }
  .card .v.small { font-size: 15px; font-weight: 600; }
  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  .grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 16px; }
  .filters { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  .filters label { font-size: 12px; color: var(--muted); display: flex; gap: 6px; align-items: center; }
  select { background: var(--card2); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 4px 8px; font-size: 12px; }
  .chart-wrap { position: relative; height: 280px; }
  .empty { color: var(--muted); font-size: 13px; padding: 24px; text-align: center; }
</style>
</head>
<body>
  <div class="top">
    <div>
      <h1>Аналитика · <span id="accName"></span></h1>
      <div class="sub" id="updated"></div>
    </div>
    <a class="btn" href="/">← Дашборд</a>
    <a class="btn" href="/account/__ACCOUNT__/farm">Фарм</a>
    <button class="btn" id="reload">Обновить</button>
    <label style="font-size:12px;color:var(--muted)">Период
      <select id="range">
        <option value="36">3 часа</option>
        <option value="144" selected>12 часов</option>
        <option value="864">3 дня</option>
        <option value="0">всё</option>
      </select>
    </label>
  </div>

  <div class="cards" id="cards"></div>

  <div id="body"></div>

<script>
const ACCOUNT = "__ACCOUNT__";
const RES = [["wood","Дерево","--wood"],["clay","Глина","--clay"],["iron","Железо","--iron"],["crop","Зерно","--crop"]];
let DATA = [];
const charts = {};

function cssVar(n){ return getComputedStyle(document.documentElement).getPropertyValue(n).trim() || "#888"; }
function fmt(n){ return (n==null?0:Math.round(n)).toLocaleString("ru-RU"); }
function fmtTime(iso){
  const d = new Date(iso);
  if (isNaN(d)) return "";
  const p = x => String(x).padStart(2,"0");
  return `${p(d.getDate())}.${p(d.getMonth()+1)} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

async function load(){
  document.getElementById("accName").textContent = ACCOUNT;
  const r = await fetch(`/api/accounts/${encodeURIComponent(ACCOUNT)}/history`);
  DATA = await r.json();
  if (!Array.isArray(DATA)) DATA = [];
  render();
}

function slice(){
  const n = parseInt(document.getElementById("range").value, 10) || 0;
  return n > 0 ? DATA.slice(-n) : DATA;
}

function lineChart(id, title, datasets, labels){
  const wrap = document.createElement("div");
  wrap.className = "panel";
  wrap.innerHTML = `<h2>${title}</h2><div class="chart-wrap"><canvas id="${id}"></canvas></div>`;
  return wrap;
}

function render(){
  const pts = slice();
  const body = document.getElementById("body");
  const cardsEl = document.getElementById("cards");
  if (!pts.length){
    cardsEl.innerHTML = "";
    body.innerHTML = `<div class="panel"><div class="empty">Пока нет данных — точки появляются по мере сбора статистики (раз в ~5 минут после старта бота).</div></div>`;
    return;
  }
  const last = pts[pts.length - 1];
  document.getElementById("updated").textContent = "обновлено " + fmtTime(last.t);

  // Сводка (последняя точка)
  const totalRes = RES.reduce((s,[k]) => s + ((last.res||{})[k]||0), 0);
  const totalProd = RES.reduce((s,[k]) => s + ((last.prod||{})[k]||0), 0);
  cardsEl.innerHTML = [
    ["Ресурсы (сумма)", fmt(totalRes)],
    ["Производство/ч", "+" + fmt(totalProd)],
    ["Войска", fmt(last.troops)],
    ["Герой HP", last.hero_hp!=null ? last.hero_hp + "%" : "—"],
    ["Золото", fmt(last.gold)],
    ["Серебро", fmt(last.silver)],
  ].map(([k,v]) => `<div class="card"><div class="k">${k}</div><div class="v small">${v}</div></div>`).join("");

  const labels = pts.map(p => fmtTime(p.t));

  if (typeof Chart === "undefined") {
    body.innerHTML = `<div class="panel"><div class="empty">Не удалось загрузить графики (Chart.js) — проверь интернет на машине с ботом.</div></div>`;
    return;
  }

  // Панели
  body.innerHTML = "";
  const grid = document.createElement("div");
  grid.className = "grid2";
  grid.appendChild(lineChart("resChart", "Ресурсы во времени"));
  grid.appendChild(lineChart("prodChart", "Производство во времени"));
  grid.appendChild(lineChart("troopsChart", "Войска во времени"));
  grid.appendChild(lineChart("heroChart", "HP героя во времени"));
  body.appendChild(grid);

  const common = {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode: "index", intersect: false },
    plugins: { legend: { labels: { color: cssVar("--muted"), boxWidth: 12, font: { size: 11 } } } },
    scales: {
      x: { ticks: { color: cssVar("--muted"), maxTicksLimit: 8, font: { size: 10 } }, grid: { color: "#232833" } },
      y: { ticks: { color: cssVar("--muted"), font: { size: 10 } }, grid: { color: "#232833" }, beginAtZero: true },
    },
  };
  const line = (k, label, color) => ({
    label, data: pts.map(p => (p[k]!=null ? p[k] : null)),
    borderColor: color, backgroundColor: color + "33", borderWidth: 2, pointRadius: 0, tension: .25,
  });
  const resLine = (rk, label, color) => ({
    label, data: pts.map(p => ((p.res||{})[rk] ?? null)),
    borderColor: color, backgroundColor: color + "22", borderWidth: 2, pointRadius: 0, tension: .25,
  });
  const prodLine = (rk, label, color) => ({
    label, data: pts.map(p => ((p.prod||{})[rk] ?? null)),
    borderColor: color, backgroundColor: color + "22", borderWidth: 2, pointRadius: 0, tension: .25,
  });

  Object.values(charts).forEach(c => c && c.destroy());
  charts.res = new Chart(document.getElementById("resChart"), {
    type: "line", data: { labels, datasets: RES.map(([k,ru,v]) => resLine(k, ru, cssVar(v))) }, options: common,
  });
  charts.prod = new Chart(document.getElementById("prodChart"), {
    type: "line", data: { labels, datasets: RES.map(([k,ru,v]) => prodLine(k, ru, cssVar(v))) }, options: common,
  });
  charts.troops = new Chart(document.getElementById("troopsChart"), {
    type: "line", data: { labels, datasets: [line("troops", "Войска", cssVar("--troops"))] }, options: common,
  });
  charts.hero = new Chart(document.getElementById("heroChart"), {
    type: "line", data: { labels, datasets: [line("hero_hp", "HP героя, %", cssVar("--hero"))] },
    options: { ...common, scales: { ...common.scales, y: { ...common.scales.y, max: 100 } } },
  });
}

document.getElementById("reload").onclick = load;
document.getElementById("range").onchange = render;
load();
setInterval(load, 60000);
</script>
</body>
</html>
